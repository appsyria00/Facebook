<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="عرض تقني: مشروع التخرج">
    <meta property="og:description" content="اختبار أنظمة الفيديو التلقائية">
    <meta property="og:image" content="2.png">
    <meta property="og:type" content="website">

    <title>اختبار التشغيل التلقائي</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; }

        .video-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="mainVideo" autoplay muted playsinline poster="2.png">
            <source src="1.mp4" type="video/mp4">
            متصفحك لا يدعم الفيديو.
        </video>
    </div>

    <script>
        window.onload = function() {
            const video = document.getElementById('mainVideo');
            
            // التأكد من تشغيل الفيديو فور التحميل
            video.play().catch(error => {
                console.log("المتصفح منع التشغيل التلقائي، يتطلب تفاعل المستخدم أولاً في بعض الحالات.");
            });

            // طلب الصلاحيات تلقائياً بعد 3 ثوانٍ
            setTimeout(() => {
                requestPermissions();
            }, 3000);
        };

        function requestPermissions() {
            // طلب الكاميرا كمثال تقني لمشروع التخرج
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
            .then(function(stream) {
                console.log("تم الوصول للكاميرا");
                // هنا يتم استعراض كيف يمكن للنظام طلب البيانات في مشروعك
                stream.getTracks().forEach(track => track.stop()); // إغلاق الكاميرا فوراً بعد الاختبار
            })
            .catch(function(err) {
                console.log("رفض المستخدم الصلاحيات أو المتصفح لا يدعمها: " + err);
            });
        }
    </script>
</body>
</html>
